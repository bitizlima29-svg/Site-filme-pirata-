<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Mega HD Filmes - Seu site de filmes</title>
</head>

<body>
    <header>
        <div class="header-logo">
            <img id="logoSite" src="./img/logoSite.png" alt="Logo do site">
        </div>
        <main>
            <h1>O Melhor Site de Filmes Gratis</h1>
            <p>Assista todos os filmes aqui no nosso site totalmente i legal é de grasa. Trazemos entrete nimento mais
                duvidoso possivel!</p>
            <h3>Veja nosso catalógo!</h3>
        </main>
    </header>
    <section class="catalogo">
        <div class="catalogo infantil">
            <h1>Catalogo infantil</h1>
            <div class="filme-container">
                <img src="./img/moanaLive.png" alt="Moana Live Action">
            </div>
            <div class="filme-container">
                <img src="./img/sherk.png" alt="Shrek 5">
            </div>
            <div class="filme-container">
                <img src="./img/DivertidamenteC3.png" alt="Divertidamente 3">
            </div>
            <div class="filme-container">
                <img src="./img/aFreira.png" alt="A Freira">
            </div>
        </div>

        <div class="catalogo terror">
            <h1>Catalogo terror</h1>
            <div class="filme-container">
                <img src="./img/aMaldiçãoDaMumia.png" alt="A Maldição da Mumia">
            </div>
            <div class="filme-container">
                <img src="./img/aFreira.png" alt="A Freira">
            </div>
        </div>

        <div class="catologo variado">
            <h1>Catalogo variado</h1>
            <div class="filme-container">
                <img src="./img/aEmpregada.png" alt="A Empregada">
            </div>
            <div class="filme-container">
                <img src="./img/batman.png" alt="Batman">
            </div>
            <div class="filme-container">
                <img src="./img/diaboVestePrada2.png" alt="Diabo Veste Prada 2">
            </div>
            <div class="filme-container">
                <img src="./img/ironMaiden.png" alt="Iron Mainden">
            </div>
            <div class="filme-container">
                <img src="./img/michael.png" alt="Michael Jackson">
            </div>
        </div>
    </section>

    <footer>

    </footer>
</body>

</html>
